<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日论文推荐</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 每日论文推荐</h1>
            <p class="subtitle">LLM Inference & AI Infrastructure</p>
        </header>

        <div class="filters">
            <label>
                <span>按日期筛选:</span>
                <select id="dateFilter">
                    <option value="all">全部</option>
                </select>
            </label>
            <label>
                <span>搜索:</span>
                <input type="text" id="searchInput" placeholder="搜索标题、关键词...">
            </label>
        </div>

        <div id="papersList" class="papers-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <script src="js/obsidian-plugin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
